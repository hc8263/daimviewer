<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.field{font-family:var(--font-family-base);font-weight:500;font-size:16px;line-height:1.5;width:100%;height:48px;padding:12px 16px;border-radius:12px;border:1px solid rgba(112,115,124,0.22);background:#fff;outline:none;color:rgba(46,47,51,0.88)}
.field:focus{border-color:#0066FF;box-shadow:0 0 0 3px rgba(0,102,255,0.16)}
.field.error{border-color:#FF4242}
.field.disabled{background:#F4F4F5;color:rgba(55,56,60,0.28);cursor:not-allowed}
.lbl{display:block;font-size:13px;font-weight:600;color:rgba(46,47,51,0.88);margin-bottom:6px}
.help{display:block;font-size:12px;color:rgba(55,56,60,0.61);margin-top:6px}
.help.error{color:#FF4242}
</style></head>
<body><div class="card">
  <div class="cap">INPUT FIELDS — default · focused · error · disabled</div>
  <div class="col" style="gap:12px">
    <div>
      <label class="lbl">이메일</label>
      <input class="field" placeholder="example@wanted.co.kr" value="hyungjin@wanted.co.kr">
    </div>
    <div>
      <label class="lbl">비밀번호</label>
      <input class="field error" type="password" value="••••••••">
      <span class="help error">비밀번호가 일치하지 않습니다.</span>
    </div>
    <div>
      <label class="lbl">회사명</label>
      <input class="field disabled" value="원티드랩" disabled>
    </div>
  </div>
</div></body></html>
