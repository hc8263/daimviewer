<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="cap">STATUS — system feedback colors</div>
  <div class="row" style="gap:12px">
    <div style="flex:1;background:#F2FFF6;border:1px solid #ACFCC7;border-radius:12px;padding:16px">
      <div style="width:12px;height:12px;border-radius:50%;background:#00BF40;margin-bottom:8px"></div>
      <div style="font-size:14px;font-weight:600;color:#006E25">Positive</div>
      <div class="mono" style="margin-top:4px">#00BF40</div>
    </div>
    <div style="flex:1;background:#FEF4E6;border:1px solid #FFD49C;border-radius:12px;padding:16px">
      <div style="width:12px;height:12px;border-radius:50%;background:#FF9200;margin-bottom:8px"></div>
      <div style="font-size:14px;font-weight:600;color:#9C5800">Cautionary</div>
      <div class="mono" style="margin-top:4px">#FF9200</div>
    </div>
    <div style="flex:1;background:#FEECEC;border:1px solid #FED5D5;border-radius:12px;padding:16px">
      <div style="width:12px;height:12px;border-radius:50%;background:#FF4242;margin-bottom:8px"></div>
      <div style="font-size:14px;font-weight:600;color:#B20C0C">Negative</div>
      <div class="mono" style="margin-top:4px">#FF4242</div>
    </div>
  </div>
</div></body></html>
