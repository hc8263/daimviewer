<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card" style="background:#F7F7F8;padding:32px 24px">
  <div class="cap">ELEVATION — 4-level dual-layer shadow system</div>
  <div class="row" style="gap:20px;justify-content:space-between;margin-top:8px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:100px;height:80px;background:#fff;border-radius:12px;box-shadow:0px 4px 6px -1px rgba(23,23,23,0.06),0px 2px 4px -2px rgba(23,23,23,0.06)"></div>
      <span class="mono" style="text-align:center">emphasize</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:100px;height:80px;background:#fff;border-radius:12px;box-shadow:0px 10px 15px -3px rgba(23,23,23,0.07),0px 4px 6px -2px rgba(0,0,0,0.07)"></div>
      <span class="mono" style="text-align:center">strong</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:100px;height:80px;background:#fff;border-radius:12px;box-shadow:0px 16px 24px -6px rgba(23,23,23,0.08),0px 6px 10px -4px rgba(23,23,23,0.08)"></div>
      <span class="mono" style="text-align:center">heavy</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:100px;height:80px;background:#fff;border-radius:12px;box-shadow:0px 24px 38px -10px rgba(23,23,23,0.12),0px 10px 15px -5px rgba(23,23,23,0.1)"></div>
      <span class="mono" style="text-align:center">modal</span>
    </div>
  </div>
</div></body></html>
