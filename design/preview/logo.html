<body><div class="card">

    <div style="width:200px;color:#141519">
      <img src="../assets/logos/wanted-horizontal.svg" style="width:200px;display:block" alt="Wanted">

      <img src="../assets/logos/wanted-symbol.svg" style="width:30px;display:block" alt="">
