<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.btn{font-family:var(--font-family-base);font-weight:700;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:16px;letter-spacing:0.006em;line-height:1.5;transition:filter .15s ease,background .15s ease}
.btn-lg{height:48px;padding:0 28px;border-radius:12px}
.btn-md{height:40px;padding:0 20px;border-radius:12px;font-size:15px}
.btn-sm{height:32px;padding:0 14px;border-radius:10px;font-size:14px}
.btn-xs{height:24px;padding:0 10px;border-radius:8px;font-size:13px}
.btn-primary{background:#0066FF;color:#fff}
.btn-primary:hover{background:#005EEB}
.btn-disabled{background:#F4F4F5;color:rgba(55,56,60,0.28);cursor:not-allowed}
</style>
</head>
<body><div class="card">
  <div class="cap">BUTTON · SOLID · PRIMARY — sizes (L · M · S · XS) + disabled</div>
  <div class="row" style="gap:12px;align-items:center;flex-wrap:wrap">
    <button class="btn btn-lg btn-primary">완료</button>
    <button class="btn btn-md btn-primary">완료</button>
    <button class="btn btn-sm btn-primary">완료</button>
    <button class="btn btn-xs btn-primary">완료</button>
    <button class="btn btn-md btn-disabled">Disabled</button>
  </div>
  <div class="mono">background: var(--color-primary-normal) · radius 12 · weight 700</div>
</div></body></html>
