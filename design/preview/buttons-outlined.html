<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.btn{font-family:var(--font-family-base);font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:16px;line-height:1.5;background:#fff;transition:background .15s}
.btn-lg{height:48px;padding:0 28px;border-radius:12px}
.btn-md{height:40px;padding:0 20px;border-radius:12px;font-size:15px}
.btn-sm{height:32px;padding:0 14px;border-radius:10px;font-size:14px}
.btn-outlined-primary{border:1px solid #0066FF;color:#0066FF}
.btn-outlined-primary:hover{background:rgba(0,102,255,0.05)}
.btn-outlined-assistive{border:1px solid rgba(112,115,124,0.22);color:rgba(46,47,51,0.88)}
.btn-outlined-assistive:hover{background:rgba(112,115,124,0.05)}
.btn-text{background:transparent;border:none;color:#0066FF;height:40px;padding:0 12px;font-size:15px;text-decoration:none}
.btn-text:hover{background:rgba(0,102,255,0.05);border-radius:8px}
</style>
</head>
<body><div class="card">
  <div class="cap">BUTTON · OUTLINED + TEXT — primary, assistive</div>
  <div class="row" style="gap:12px;align-items:center;flex-wrap:wrap">
    <button class="btn btn-lg btn-outlined-primary">팔로우</button>
    <button class="btn btn-md btn-outlined-primary">팔로우</button>
    <button class="btn btn-md btn-outlined-assistive">취소</button>
    <button class="btn btn-sm btn-outlined-assistive">옵션</button>
    <button class="btn btn-text">더보기 →</button>
  </div>
</div></body></html>
