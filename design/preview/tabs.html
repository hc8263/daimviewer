<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.tab{display:inline-flex;align-items:center;gap:6px;height:48px;padding:0 16px;font-weight:700;font-size:15px;color:rgba(55,56,60,0.61);position:relative;cursor:pointer}
.tab.active{color:#000}
.tab.active::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:#000;border-radius:2px 2px 0 0}
.tab .num{background:rgba(112,115,124,0.12);color:rgba(55,56,60,0.61);font-size:12px;padding:2px 6px;border-radius:9999px}
.tab.active .num{background:rgba(0,0,0,0.06);color:#000}
.bar{border-bottom:1px solid rgba(112,115,124,0.22);display:flex;gap:4px}
</style></head>
<body><div class="card">
  <div class="cap">TABS</div>
  <div class="bar">
    <div class="tab active">홈</div>
    <div class="tab">채용 공고 <span class="num">1,283</span></div>
    <div class="tab">이력서</div>
    <div class="tab">스카웃 <span class="num">17</span></div>
    <div class="tab">알림</div>
  </div>
  <div class="bar">
    <div class="tab">최신순</div>
    <div class="tab active">응답률순</div>
    <div class="tab">연봉순</div>
  </div>
</div></body></html>
