<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.j-card{background:#fff;border:1px solid rgba(112,115,124,0.16);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:12px;width:100%}
.j-card .thumb{height:120px;background:linear-gradient(135deg,#EAF2FE,#C9DEFE);border-radius:12px}
.j-card h4{margin:0;font-size:16px;font-weight:700;color:#000;letter-spacing:-0.002em}
.j-card .co{font-size:13px;color:rgba(55,56,60,0.61);font-weight:600}
.j-card .meta{font-size:12px;color:rgba(55,56,60,0.61);font-weight:600}
.j-card .reward{color:#005EEB;font-size:13px;font-weight:700;margin-top:auto}
</style></head>
<body><div class="card">
  <div class="cap">JOB CARD — the core product cell</div>
  <div class="row" style="gap:12px;align-items:stretch">
    <div class="j-card" style="flex:1">
      <div class="thumb" style="background:linear-gradient(135deg,#F2FFF6,#ACFCC7)"></div>
      <h4>프로덕트 디자이너</h4>
      <div class="co">원티드랩</div>
      <div class="meta">서울 · 강남구 · 3년+</div>
      <div class="reward">채용보상금 500만원</div>
    </div>
    <div class="j-card" style="flex:1">
      <div class="thumb"></div>
      <h4>시니어 프론트엔드 엔지니어</h4>
      <div class="co">Wanted Lab</div>
      <div class="meta">서울 · 강남구 · 5년+</div>
      <div class="reward">채용보상금 1,000만원</div>
    </div>
    <div class="j-card" style="flex:1">
      <div class="thumb" style="background:linear-gradient(135deg,#FFFAF7,#FEDBC6)"></div>
      <h4>UX 리서처</h4>
      <div class="co">우아한형제들</div>
      <div class="meta">서울 · 송파구 · 신입~3년</div>
      <div class="reward">채용보상금 300만원</div>
    </div>
  </div>
</div></body></html>
