<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="cap">RADIUS — small to outer-card</div>
  <div class="row" style="gap:12px;justify-content:space-between">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:56px;height:56px;background:#0066FF;border-radius:4px"></div><span class="mono">4 · xs</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:56px;height:56px;background:#0066FF;border-radius:8px"></div><span class="mono">8 · sm</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:56px;height:56px;background:#0066FF;border-radius:12px"></div><span class="mono">12 · md</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:56px;height:56px;background:#0066FF;border-radius:16px"></div><span class="mono">16 · lg</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:56px;height:56px;background:#0066FF;border-radius:24px"></div><span class="mono">24 · xl</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:56px;height:56px;background:#0066FF;border-radius:32px"></div><span class="mono">32 · 2xl</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:56px;height:56px;background:#0066FF;border-radius:9999px"></div><span class="mono">full</span></div>
  </div>
  <div class="mono">Buttons + inputs = 12 · cards = 16/24 · sections = 32 · pills = full</div>
</div></body></html>
