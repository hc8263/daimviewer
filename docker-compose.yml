services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dmpat
    ports:
      - "5432:5432"
    volumes:
      - dmpat_pgdata:/var/lib/postgresql/data
      - ./web/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dmpat"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Translates Neon's HTTP-SQL protocol into a plain Postgres connection,
  # so the @neondatabase/serverless driver works against the `db` container.
  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    restart: unless-stopped
    environment:
      PG_CONNECTION_STRING: postgres://postgres:postgres@db:5432/dmpat
    ports:
      - "4444:4444"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Connection string is parsed by the driver but actual queries go through
      # NEON_HTTP_PROXY; user/db/host must still match the proxy's pg target.
      DATABASE_URL: postgres://postgres:postgres@db:5432/dmpat?sslmode=disable
      NEON_HTTP_PROXY: http://neon-proxy:4444/sql
      # No Basic Auth in local dev
      SITE_PASSWORD: ""
      # 다임뷰어 관리자 모드 비밀번호 (/admin)
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      # Optional: enable chat by exporting one of these in your shell before `up`
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./web:/app
      # Keep container's node_modules separate from host's
      - dmpat_web_modules:/app/node_modules
      - dmpat_web_next:/app/.next
    depends_on:
      neon-proxy:
        condition: service_started

volumes:
  dmpat_pgdata:
  dmpat_web_modules:
  dmpat_web_next:
